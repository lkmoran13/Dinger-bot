name: Dinger Bot

on:
  schedule:
    - cron: '* 17-23 * * *'
    - cron: '* 0-4 * * *'
  workflow_dispatch:

jobs:
  check-hrs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Cache seen HRs
        uses: actions/cache@v3
        with:
          path: seen_hrs.json
          key: seen-hrs-${{ github.run_id }}
          restore-keys: |
            seen-hrs-

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run dinger bot
        env:
          GROUPME_BOT_ID: ${{ secrets.GROUPME_BOT_ID }}
        run: python dinger_bot.py
